<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A real-time dashboard tracking the latest BigQuery Release Notes, with powerful search, category filtering, and direct social sharing to Twitter.">
  <title>BigQuery Release Notes Dashboard</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Main App Shell -->
  <div id="app-shell" class="container">
    
    <!-- Top Header and Brand bar -->
    <header>
      <div class="brand-section">
        <div class="logo-icon">Q</div>
        <div class="brand-title">
          <h1>BigQuery Releases</h1>
          <p>Real-time Google Cloud Feed Tracker</p>
        </div>
      </div>
      
      <div class="controls-wrapper">
        <!-- Search -->
        <div class="search-container">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search release notes..." aria-label="Search release notes">
        </div>
        
        <!-- Refresh Button -->
        <button id="btn-refresh" class="btn" aria-label="Refresh release notes">
          <span id="refresh-spinner" class="spinner" style="display: none;"></span>
          <span id="refresh-text">Refresh</span>
        </button>
      </div>
    </header>

    <!-- Main Two-Column Layout -->
    <main class="main-layout">
      
      <!-- Left Sidebar (Filters and Stats) -->
      <section class="sidebar" aria-label="Filters and Statistics">
        
        <!-- Category Filter Panel -->
        <div class="panel">
          <h2 class="panel-title">Categories</h2>
          <nav class="filter-list" aria-label="Category filter options">
            <button class="filter-btn active" data-category="all">
              <span>🌐 All Updates</span>
              <span class="badge-count">0</span>
            </button>
            <button class="filter-btn" data-category="feature">
              <span><span class="dot dot-feature"></span>Features</span>
              <span class="badge-count">0</span>
            </button>
            <button class="filter-btn" data-category="change">
              <span><span class="dot dot-change"></span>Changes</span>
              <span class="badge-count">0</span>
            </button>
            <button class="filter-btn" data-category="issue">
              <span><span class="dot dot-issue"></span>Issues</span>
              <span class="badge-count">0</span>
            </button>
            <button class="filter-btn" data-category="breaking">
              <span><span class="dot dot-breaking"></span>Breaking</span>
              <span class="badge-count">0</span>
            </button>
            <button class="filter-btn" data-category="announcement">
              <span><span class="dot dot-announcement"></span>Announcements</span>
              <span class="badge-count">0</span>
            </button>
          </nav>
        </div>

        <!-- Metrics / Summary Panel -->
        <div class="panel">
          <h2 class="panel-title">Summary Metrics</h2>
          <div class="stats-list">
            <div class="stat-item">
              <span id="stat-total" class="stat-val">0</span>
              <span class="stat-lbl">Total Updates</span>
            </div>
            <div class="stat-item">
              <span id="stat-features" class="stat-val">0</span>
              <span class="stat-lbl">Features</span>
            </div>
            <div class="stat-item">
              <span id="stat-issues" class="stat-val">0</span>
              <span class="stat-lbl">Issues</span>
            </div>
            <div class="stat-item">
              <span id="stat-others" class="stat-val">0</span>
              <span class="stat-lbl">Others</span>
            </div>
          </div>
        </div>

      </section>

      <!-- Right Feed Section -->
      <section class="feed-section" aria-label="Release Notes Feed">
        <div class="feed-header">
          <div class="feed-header-info">
            <h2 class="feed-title">Latest Updates</h2>
            <span id="sync-time" class="feed-sync-time">Synced: Loading...</span>
          </div>
        </div>

        <!-- Feed Grid (Will be populated by JS) -->
        <div id="feed-grid" class="feed-grid">
          <!-- Shimmer loadings will be inserted here initially -->
          <div class="shimmer-card"></div>
          <div class="shimmer-card"></div>
          <div class="shimmer-card"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- Native HTML Modal Dialog for tweeting -->
  <dialog id="tweet-dialog" aria-labelledby="dialog-title" aria-describedby="dialog-desc">
    <div class="modal-header">
      <h2 id="dialog-title" class="modal-title">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24" style="color: var(--twitter-blue);"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Draft Update Tweet
      </h2>
      <button id="btn-close-modal" class="modal-close" aria-label="Close dialog">&times;</button>
    </div>
    <div class="modal-body">
      <p id="dialog-desc" style="display: none;">Edit your message before posting to Twitter.</p>
      <div class="tweet-composer">
        <textarea id="tweet-textarea" class="tweet-textarea" placeholder="What's happening?" aria-label="Tweet message"></textarea>
        <div class="tweet-footer">
          <div class="tweet-char-count">
            <svg class="progress-ring" width="20" height="20">
              <circle class="progress-ring__circle" stroke="var(--primary)" stroke-width="2" fill="transparent" r="8" cx="10" cy="10"></circle>
            </svg>
            <span id="char-count-text">280</span> characters left
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btn-copy-tweet" class="btn btn-secondary">Copy Text</button>
        <button id="btn-confirm-tweet" class="btn">
          Share on Twitter
        </button>
      </div>
    </div>
  </dialog>

  <!-- Popover-style Toast Notification -->
  <div id="toast" class="toast" role="alert" aria-live="assertive">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: hsl(var(--color-feature));"><circle cx="12" cy="12" r="10"></circle><polyline points="9 11 12 14 22 4"></polyline></svg>
    <span id="toast-msg">Success Message</span>
  </div>

  <!-- Main JavaScript -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
